<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="32" cy="32" r="30" fill="url(#gradient1)" stroke="url(#gradient2)" stroke-width="2"/>
  
  <!-- 主要图标 - 机器人头部 -->
  <rect x="20" y="18" width="24" height="20" rx="4" fill="white" opacity="0.9"/>
  
  <!-- 眼睛 -->
  <circle cx="26" cy="26" r="2" fill="#1e88e5"/>
  <circle cx="38" cy="26" r="2" fill="#1e88e5"/>
  
  <!-- 嘴巴 -->
  <rect x="28" y="32" width="8" height="2" rx="1" fill="#1e88e5"/>
  
  <!-- 天线 -->
  <line x1="32" y1="18" x2="32" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="10" r="2" fill="#ff6b35"/>
  
  <!-- 身体连接线 -->
  <line x1="32" y1="38" x2="32" y2="44" stroke="white" stroke-width="2"/>
  
  <!-- 齿轮装饰 -->
  <g transform="translate(12, 44)">
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.8"/>
    <path d="M-3,-3 L3,3 M3,-3 L-3,3" stroke="#1e88e5" stroke-width="1.5"/>
  </g>
  
  <g transform="translate(52, 44)">
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.8"/>
    <path d="M-3,-3 L3,3 M3,-3 L-3,3" stroke="#1e88e5" stroke-width="1.5"/>
  </g>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>
  </defs>
</svg>